<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Navbar Nümunəsi</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <!-- Özəl stil -->
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
  <!-- Naviqasiya paneli (navbar) -->
  <nav class="naviqasiya navbar-expand-lg">
    <div class="container d-flex align-items-center">
      <!-- Logo və marka sol tərəfdə -->
      <a href="#" class="marka d-flex align-items-center me-auto">
        <img
          src="https://img.icons8.com/ios-filled/30/3d6dd4/artificial-intelligence.png"
          alt="logo"
          class="logo me-2"
        />
        Süni İntellekt
      </a>

      <!-- Naviqasiya linkləri ortada -->
      <ul class="menu navbar-nav justify-content-center flex-grow-2">
        <li class="element"><a href="#" class="link">Əsas Səhifə</a></li>
        <li class="element"><a href="#" class="link">Haqqımızda</a></li>
        <li class="element"><a href="#" class="link">Xidmətlər</a></li>
        <li class="element"><a href="#" class="link">Blog</a></li>
        <li class="element"><a href="#" class="link">Əlaqə</a></li>
      </ul>

      <!-- Daxil ol düyməsi sağda -->
      <a href="#" class="duyme">Daxil ol</a>

      <!-- Kiçik ekran üçün toggle düyməsi -->
      <button
        class="toggle-btn navbar-toggler text-white"
        type="button"
        data-bs-toggle="collapse"
        data-bs-target="#navbarMenyu"
      >
        <span class="navbar-toggler-icon"></span>
      </button>
    </div>

    <!-- Collapse edilən linklər (mobil üçün) -->
    <div class="collapse navbar-collapse" id="navbarMenyu">
      <!-- Burda eyni linklər və düymə görünə bilər mobil üçün, ya da fərqli dizayn -->
    </div>
  </nav>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
