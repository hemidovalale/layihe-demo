<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Navbar Nümunəsi</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <!-- Özəl stil -->
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
  <!-- Naviqasiya paneli (navbar) -->
  <nav class="naviqasiya navbar-expand-lg">
    <div class="container d-flex align-items-center">
      <!-- Logo və marka sol tərəfdə -->
      <a href="#" class="marka me-auto">
        <img
          src="assets/images/lale.svg"
          alt="logo"
          class="logo me-2"
        />
        
      </a>

      <!-- Naviqasiya linkləri ortada -->
      <ul class="menu navbar-nav justify-content-center flex-grow-2">
        <li class="element"><a href="#" class="link">home</a></li>
        <li class="element"><a href="#" class="link">about</a></li>
        <li class="element"><a href="#" class="link">services</a></li>
        <li class="element"><a href="#" class="link">blog</a></li>
        <li class="element"><a href="#" class="link">contact</a></li>
      </ul>

      <!-- Daxil ol düyməsi sağda -->
      <a href="#" class="duyme">sign ln</a>

      <!-- Kiçik ekran üçün toggle düyməsi -->
      <button
        class="toggle-btn navbar-toggler text-white"
        type="button"
        data-bs-toggle="collapse"
        data-bs-target="#navbarMenyu"
      >
        <span class="navbar-toggler-icon"></span>
      </button>
    </div>

    <!-- Collapse edilən linklər (mobil üçün) -->
    <div class="collapse navbar-collapse" id="navbarMenyu">
      <!-- Burda eyni linklər və düymə görünə bilər mobil üçün, ya da fərqli dizayn -->
    </div>
  </nav>

  <section class="my-section">
    <h1 class="my-title">Next Generation Platform</h1>
  </section>
  



  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
